<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>QR Generator | FgeeHa Tools</title>
  <meta name="description" content="Generate QR codes for any text or URL and download as PNG."/>
  <style>
    :root {
      --bg: #1a1b1e;
      --surface: #25262b;
      --surface2: #2c2e33;
      --border: rgba(255,255,255,0.1);
      --text: #c1c2c5;
      --text-bright: #e9ecef;
      --accent: #4dabf7;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 60px 20px 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { max-width: 560px; width: 100%; }
    h1 { color: var(--text-bright); font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { font-size: .9rem; margin-bottom: 24px; }
    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 24px; border: 1px solid var(--border); margin-bottom: 16px;
    }
    label { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 6px; }
    input[type=text] {
      width: 100%; padding: 10px 14px;
      background: var(--bg); color: var(--text-bright);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: .95rem; outline: none; transition: border-color .2s; margin-bottom: 14px;
    }
    input[type=text]:focus { border-color: var(--accent); }
    .size-row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .size-row label { margin-bottom: 0; }
    select {
      padding: 8px 12px; background: var(--bg); color: var(--text-bright);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: .88rem; outline: none; cursor: pointer;
    }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 9px 18px; border: none; border-radius: var(--radius);
      cursor: pointer; font-size: .88rem; font-weight: 700;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-gen { background: var(--accent); color: #1a1b1e; }
    .btn-dl { background: var(--surface2); color: var(--text-bright); border: 1px solid var(--border); }
    button:hover { opacity: .85; }
    .qr-area {
      display: flex; justify-content: center; align-items: center;
      min-height: 260px; padding: 20px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    #qrcode { background: #fff; padding: 12px; border-radius: 4px; display: inline-block; }
    .placeholder { color: var(--text); font-size: .9rem; text-align: center; }
    .error { color: #ff6b6b; font-size: .85rem; margin-top: 8px; }
  </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;color:#fff;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:8px;font-size:.85rem;text-decoration:none;backdrop-filter:blur(4px);">← Home</a>

<div class="container">
  <h1>📷 QR Generator</h1>
  <p class="subtitle">Generate QR codes for any text or URL — download as PNG</p>

  <div class="card">
    <label>Text or URL</label>
    <input type="text" id="qr-input" placeholder="https://example.com or any text…" value="https://fgeeha.github.io"/>

    <div class="size-row">
      <label>Size</label>
      <select id="qr-size">
        <option value="128">128 px</option>
        <option value="200">200 px</option>
        <option value="256" selected>256 px</option>
        <option value="400">400 px</option>
        <option value="512">512 px</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn-gen" onclick="generateQR()">Generate QR</button>
      <button class="btn-dl" onclick="downloadQR()">Download PNG</button>
    </div>
    <div class="error" id="qr-err"></div>
  </div>

  <div class="qr-area">
    <div id="qrcode"><span class="placeholder">QR code will appear here</span></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  let qrInstance = null;

  function generateQR() {
    const text = document.getElementById('qr-input').value.trim();
    const size = parseInt(document.getElementById('qr-size').value);
    const errEl = document.getElementById('qr-err');
    const container = document.getElementById('qrcode');

    if (!text) {
      errEl.textContent = 'Please enter some text or URL.';
      return;
    }
    errEl.textContent = '';

    // Clear previous
    container.innerHTML = '';
    qrInstance = null;

    try {
      qrInstance = new QRCode(container, {
        text: text,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      errEl.textContent = 'Error: ' + e.message;
    }
  }

  function downloadQR() {
    const canvas = document.querySelector('#qrcode canvas');
    const img = document.querySelector('#qrcode img');
    if (canvas) {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } else if (img) {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = img.src;
      link.click();
    }
  }

  // Generate on load
  generateQR();

  // Auto-regenerate on Enter
  document.getElementById('qr-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateQR();
  });
</script>
</body>
</html>

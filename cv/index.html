<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Никита Колесников — резюме · переключатель вариантов</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<script>
// Sync the variant from localStorage before paint to avoid flash
(function() {
    const saved = localStorage.getItem('cv-variant') || 'tech';
    document.documentElement.setAttribute('data-shell-variant', saved);
})();
</script>

<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

:root {
    --bg: #f3ede2;
    --ink: #1a1a1f;
    --ink-2: #2e2e36;
    --ink-3: #5a5a64;
    --rule: rgba(26, 26, 31, 0.14);
    --rule-strong: rgba(26, 26, 31, 0.32);
    --chip-bg: rgba(26, 26, 31, 0.04);
    --accent-edit: #c14a23;
    --accent-tech: #38bdf8;
}

html[data-shell-variant="tech"], html:not([data-shell-variant]) {
    --bg: #0a0e1a;
    --ink: #e8ecf3;
    --ink-2: #cbd5e1;
    --ink-3: #94a3b8;
    --rule: rgba(148, 163, 184, 0.16);
    --rule-strong: rgba(148, 163, 184, 0.32);
    --chip-bg: rgba(255, 255, 255, 0.04);
}

body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.4s ease, color 0.4s ease;
}

/* ====== Shell topbar ====== */
.shell-topbar {
    flex: 0 0 auto;
    z-index: 20;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: color-mix(in srgb, var(--bg) 84%, transparent);
    border-bottom: 1px solid var(--rule);
    transition: background 0.4s ease, border-color 0.4s ease;
}

.shell-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: 14px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
}

.shell-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: var(--ink-2);
    text-transform: uppercase;
}

.shell-brand .mark {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--bg);
    display: grid;
    place-items: center;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 0.95rem;
    transition: background 0.4s ease, color 0.4s ease;
}

.shell-brand .sep { color: var(--ink-3); }

/* ====== Variant switcher ====== */
.variant-switch {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: stretch;
    background: var(--chip-bg);
    border: 1px solid var(--rule-strong);
    border-radius: 999px;
    padding: 3px;
}

.variant-switch .vs-pill {
    position: absolute;
    top: 3px;
    bottom: 3px;
    left: 3px;
    width: calc(50% - 3px);
    border-radius: 999px;
    background: var(--ink);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
    z-index: 0;
}

.variant-switch[data-active="editorial"] .vs-pill { transform: translateX(0); }
.variant-switch[data-active="tech"] .vs-pill { transform: translateX(100%); }

.variant-switch button {
    position: relative;
    z-index: 1;
    background: transparent;
    border: 0;
    padding: 7px 18px;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    cursor: pointer;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: color 0.25s ease;
    white-space: nowrap;
}

.variant-switch button.is-active { color: var(--bg); font-weight: 600; }

.variant-switch button .swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-edit);
}
.variant-switch button[data-variant="tech"] .swatch { background: var(--accent-tech); }

.shell-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.shell-meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
}

@media (max-width: 760px) {
    .shell-inner { padding: 12px 18px; gap: 14px; }
    .shell-meta { display: none; }
    .variant-switch button { padding: 6px 12px; font-size: 0.66rem; }
}

@media (max-width: 460px) {
    .shell-brand span:not(.mark) { display: none; }
    .variant-switch button .swatch { display: none; }
}

/* ====== Stage with two iframes ====== */
.stage {
    flex: 1 1 auto;
    position: relative;
    background: var(--bg);
    transition: background 0.4s ease;
    overflow: hidden;
}

.stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.stage iframe.active {
    opacity: 1;
    pointer-events: auto;
}

.loading {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    pointer-events: none;
    z-index: 0;
    opacity: 1;
    transition: opacity 0.35s ease;
}

.loading.hide { opacity: 0; pointer-events: none; }

@media print {
    .shell-topbar { display: none; }
    .stage { overflow: visible; }
}
</style>
</head>

<body>

<header class="shell-topbar">
    <div class="shell-inner">
        <div class="shell-brand">
            <span class="mark">К</span>
            <span>Никита Колесников</span>
            <span class="sep">·</span>
            <span class="shell-meta">CV · 2026</span>
        </div>

        <div class="shell-right">
            <div class="variant-switch" id="variant-switch" data-active="tech">
                <span class="vs-pill"></span>
                <button type="button" data-variant="editorial">
                    <span class="swatch"></span>Editorial
                </button>
                <button type="button" data-variant="tech" class="is-active">
                    <span class="swatch"></span>Classic · Tech
                </button>
            </div>
        </div>
    </div>
</header>

<div class="stage">
    <div class="loading" id="loading">Загружаю…</div>
    <iframe id="frame-editorial" title="Editorial вариант" loading="eager"></iframe>
    <iframe id="frame-tech" title="Classic · Tech вариант" loading="lazy"></iframe>
</div>

<script>
const SOURCES = {
    editorial: 'ResumeV3.html?embed=1',
    tech: 'ResumeV2.html?embed=1',
};

const frames = {
    editorial: document.getElementById('frame-editorial'),
    tech: document.getElementById('frame-tech'),
};

const variantSwitch = document.getElementById('variant-switch');
const loadingEl = document.getElementById('loading');

let current = localStorage.getItem('cv-variant') || 'tech';

function hideLoading() {
    loadingEl.classList.add('hide');
}

function setVariant(mode, { skipPersist } = {}) {
    if (!SOURCES[mode]) return;
    current = mode;
    document.documentElement.setAttribute('data-shell-variant', mode);
    variantSwitch.setAttribute('data-active', mode);
    variantSwitch.querySelectorAll('button').forEach(b => {
        b.classList.toggle('is-active', b.dataset.variant === mode);
    });
    Object.entries(frames).forEach(([key, el]) => {
        el.classList.toggle('active', key === mode);
    });
    const f = frames[mode];
    if (!f.dataset.loaded) {
        // Attach listener BEFORE setting src to avoid missing the load event
        f.addEventListener('load', hideLoading, { once: true });
        f.src = SOURCES[mode];
        f.dataset.loaded = '1';
    } else {
        // Already loaded — hide immediately
        hideLoading();
    }
    if (!skipPersist) localStorage.setItem('cv-variant', mode);
}

// Fallback: never let loading hang — hide after 4s regardless
setTimeout(hideLoading, 4000);

// Init
setVariant(current, { skipPersist: true });

// Preload the other variant in background for instant switching
setTimeout(() => {
    const other = current === 'editorial' ? 'tech' : 'editorial';
    if (!frames[other].dataset.loaded) {
        frames[other].src = SOURCES[other];
        frames[other].dataset.loaded = '1';
    }
}, 1500);

variantSwitch.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-variant]');
    if (btn) setVariant(btn.dataset.variant);
});

// Keyboard shortcuts: 1 → editorial, 2 → tech
window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '1') setVariant('editorial');
    if (e.key === '2') setVariant('tech');
});
</script>

</body>
</html>

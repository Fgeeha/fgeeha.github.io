<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work day timer Nikita Kolesnikov (FgeeHa)</title>

  <style>
    :root {
      --bg:         #f1efe8;
      --card:       #ffffff;
      --surface:    #f1efe8;
      --border:     rgba(0,0,0,0.12);
      --border2:    rgba(0,0,0,0.22);
      --t1:         #1a1a18;
      --t2:         #6b6b67;
      --t3:         #a0a09b;
      --r-md:       8px;
      --r-lg:       12px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1c1c1a; --card:#242422; --surface:#2e2e2b;
        --border:rgba(255,255,255,0.11); --border2:rgba(255,255,255,0.22);
        --t1:#f0ede6; --t2:#9e9e9a; --t3:#5f5f5b;
      }
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:2rem;
    }

    .card{
      background:var(--card);
      border:0.5px solid var(--border);
      border-radius:var(--r-lg);
      padding:2rem 2.5rem;
      width:100%;max-width:480px;
      position:relative;
    }

    .day-label{font-size:12px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
    .status{font-size:21px;font-weight:500;color:var(--t1);margin-bottom:1.25rem}
    .big-time{font-size:56px;font-weight:500;color:var(--t1);letter-spacing:-2px;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums}
    .sub{font-size:14px;color:var(--t2);margin-bottom:1.75rem;min-height:20px}

    /* ── 3 bars ── */
    .bars-block{margin-bottom:1.5rem;display:flex;flex-direction:column;gap:10px}

    .bar-row{}
    .bar-row-label{
      display:flex;justify-content:space-between;
      font-size:11px;color:var(--t3);
      letter-spacing:.03em;margin-bottom:4px;
    }
    .bar-row-label .bl{color:var(--t2);font-weight:500}

    .bar-track{
      height:8px;border-radius:6px;
      background:var(--surface);
      overflow:visible;
      position:relative;
    }
    .bar-fill{
      height:8px;border-radius:6px;
      transition:width .9s linear;
      position:relative;
    }

    /* morning — green */
    .bar-fill.morning{background:#1D9E75}
    /* lunch — amber */
    .bar-fill.lunch{background:#BA7517}
    /* fuse — orange→red gradient */
    .bar-fill.fuse{
      background:linear-gradient(90deg,#e07b20,#d63030);
      border-radius:6px;
      overflow:visible;
    }
    /* flame tip on fuse */
    .fuse-flame{
      position:absolute;
      right:-8px;top:50%;
      transform:translateY(-50%);
      font-size:14px;
      line-height:1;
      pointer-events:none;
      animation:flicker .35s ease-in-out infinite alternate;
    }
    @keyframes flicker{from{opacity:.8;transform:translateY(-50%) scale(1)}to{opacity:1;transform:translateY(-52%) scale(1.15)}}

    /* segments */
    .segments{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem}
    .seg{background:var(--surface);border-radius:var(--r-md);padding:10px 12px}
    .seg-label{font-size:11px;color:var(--t2);margin-bottom:3px;letter-spacing:.02em}
    .seg-val{font-size:15px;font-weight:500;color:var(--t1);font-variant-numeric:tabular-nums}

    /* settings */
    .schedule-btn{
      font-size:13px;color:var(--t2);background:none;
      border:0.5px solid var(--border2);border-radius:var(--r-md);
      padding:7px 14px;cursor:pointer;width:100%;margin-bottom:1rem;
      transition:background .15s;
    }
    .schedule-btn:hover{background:var(--surface)}
    .schedule-panel{display:none;border:0.5px solid var(--border);border-radius:var(--r-md);padding:1rem;margin-bottom:1rem}
    .schedule-panel.open{display:block}
    .schedule-panel label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px;margin-top:12px}
    .schedule-panel label:first-of-type{margin-top:0}
    .schedule-panel input[type=time]{
      font-size:14px;padding:6px 10px;
      border:0.5px solid var(--border2);border-radius:var(--r-md);
      background:var(--card);color:var(--t1);width:100%;outline:none;
    }
    .schedule-panel input[type=time]:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.18)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .save-btn{margin-top:14px;font-size:13px;padding:7px 0;width:100%}

    /* fireworks canvas */
    #fw-canvas{
      position:fixed;inset:0;
      width:100%;height:100%;
      pointer-events:none;
      z-index:100;
      display:none;
    }

    /* done screen */
    .done-badge{
      text-align:center;padding:1rem 0 .5rem;
    }
    .done-badge .emoji{font-size:48px;display:block;margin-bottom:.5rem}
  </style>
</head>
<body>

<canvas id="fw-canvas"></canvas>

<div class="card">
  <div class="day-label" id="day-label">—</div>
  <div class="status" id="status">—</div>
  <div id="main-content">
    <div class="big-time" id="big-time">--:--:--</div>
    <div class="sub" id="sub"></div>

    <div class="bars-block">

      <div class="bar-row" id="row-morning">
        <div class="bar-row-label">
          <span class="bl">До обеда</span>
          <span id="b1-times"></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill morning" id="bar1" style="width:0%"></div>
        </div>
      </div>

      <div class="bar-row" id="row-lunch">
        <div class="bar-row-label">
          <span class="bl">Обед</span>
          <span id="b2-times"></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill lunch" id="bar2" style="width:0%"></div>
        </div>
      </div>

      <div class="bar-row" id="row-after">
        <div class="bar-row-label">
          <span class="bl">После обеда</span>
          <span id="b3-times"></span>
        </div>
        <div class="bar-track" style="overflow:visible">
          <div class="bar-fill fuse" id="bar3" style="width:0%">
            <span class="fuse-flame" id="fuse-flame">🔥</span>
          </div>
        </div>
      </div>

    </div>

    <div class="segments">
      <div class="seg"><div class="seg-label">До обеда</div><div class="seg-val" id="seg-lunch">—</div></div>
      <div class="seg"><div class="seg-label">Обед</div><div class="seg-val" id="seg-break">—</div></div>
      <div class="seg"><div class="seg-label">После обеда</div><div class="seg-val" id="seg-after">—</div></div>
    </div>
  </div>

  <button class="schedule-btn" onclick="toggleSchedule()">Настроить расписание</button>
  <div class="schedule-panel" id="sched-panel">
    <div class="grid2">
      <div>
        <label>Начало (пн–пт)</label>
        <input type="time" id="s-start" value="08:30">
      </div>
      <div>
        <label>Конец (пн–чт)</label>
        <input type="time" id="s-end-wk" value="17:30">
      </div>
      <div>
        <label>Конец в пятницу</label>
        <input type="time" id="s-end-fri" value="16:30">
      </div>
      <div></div>
      <div>
        <label>Обед: начало</label>
        <input type="time" id="s-lunch-s" value="12:00">
      </div>
      <div>
        <label>Обед: конец</label>
        <input type="time" id="s-lunch-e" value="12:48">
      </div>
    </div>
    <button class="schedule-btn save-btn" onclick="saveSchedule()">Сохранить</button>
  </div>
</div>

<script>
/* ── schedule ── */
let sched={start:"08:30",endWk:"17:30",endFri:"16:30",lunchS:"12:00",lunchE:"12:48"};
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function fmt(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return[h,m,s].map(v=>String(v).padStart(2,'0')).join(':');}
function fmtHM(min){if(min<=0)return"0 мин";const h=Math.floor(min/60),m=min%60;if(h&&m)return h+"ч "+m+"м";if(h)return h+"ч";return m+"м";}
const DAYS=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];

/* ── fireworks ── */
const canvas=document.getElementById("fw-canvas");
const ctx=canvas.getContext("2d");
let particles=[];
let fwRunning=false;
let fwRaf=null;

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.addEventListener("resize",resize);resize();

function spawnBurst(x,y){
  const colors=["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#FF922B","#CC5DE8","#F06595","#74C0FC"];
  for(let i=0;i<80;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      alpha:1,
      color:colors[Math.floor(Math.random()*colors.length)],
      r:2+Math.random()*3,
      gravity:.12
    });
  }
}

function fwFrame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.alpha-=.018;
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.alpha>0);
  if(fwRunning){
    if(Math.random()<.06)spawnBurst(Math.random()*canvas.width,Math.random()*canvas.height*.6+50);
    fwRaf=requestAnimationFrame(fwFrame);
  } else if(particles.length>0){
    fwRaf=requestAnimationFrame(fwFrame);
  } else {
    canvas.style.display="none";
  }
}

function startFireworks(){
  if(fwRunning)return;
  fwRunning=true;
  canvas.style.display="block";
  for(let i=0;i<5;i++)spawnBurst(Math.random()*canvas.width,Math.random()*canvas.height*.5+80);
  fwFrame();
  setTimeout(()=>{fwRunning=false;},6000);
}

/* ── state tracking ── */
let prevPhase="";

/* ── tick ── */
function tick(){
  const now=new Date(),dow=now.getDay(),cur=now.getHours()*60+now.getMinutes(),sec=now.getSeconds();
  document.getElementById("day-label").textContent=DAYS[dow];

  const isWeekend=(dow===0||dow===6);
  const isFri=(dow===5);
  const isWorkday=dow>=1&&dow<=5;
  const startMin=toMin(sched.start);
  const endMin=isWorkday?(isFri?toMin(sched.endFri):toMin(sched.endWk)):0;
  const lunchS=toMin(sched.lunchS),lunchE=toMin(sched.lunchE);

  let status,bigTime,sub,phase;
  let p1=0,p2=0,p3=0;
  let segLunch="—",segBreak="—",segAfter="—";
  let showFlame=false;

  const b1times=sched.start+" – "+sched.lunchS;
  const b2times=sched.lunchS+" – "+sched.lunchE;
  const b3times=sched.lunchE+" – "+(isFri?sched.endFri:sched.endWk);

  document.getElementById("b1-times").textContent=b1times;
  document.getElementById("b2-times").textContent=b2times;
  document.getElementById("b3-times").textContent=b3times;

  if(isWeekend){
    phase="weekend";
    status="Сегодня выходной"; bigTime="—"; sub="Отдыхайте!";

  } else if(cur<startMin){
    phase="before";
    const rem=(startMin-cur)*60-sec;
    status="До начала рабочего дня"; bigTime=fmt(rem); sub="Начало в "+sched.start;

  } else if(cur>=startMin&&cur<lunchS){
    phase="morning";
    const rem=(lunchS-cur)*60-sec;
    status="До обеда"; bigTime=fmt(rem); sub="Первая половина дня";
    p1=Math.min(100,(((cur-startMin)*60+sec)/((lunchS-startMin)*60))*100);
    segLunch=fmtHM(lunchS-cur);
    segBreak=fmtHM(lunchE-lunchS);
    segAfter=fmtHM(Math.max(0,endMin-lunchE));

  } else if(cur>=lunchS&&cur<lunchE){
    phase="lunch";
    const rem=(lunchE-cur)*60-sec;
    status="Обед"; bigTime=fmt(rem); sub="Возвращение в "+sched.lunchE;
    p1=100;
    p2=Math.min(100,(((cur-lunchS)*60+sec)/((lunchE-lunchS)*60))*100);
    segLunch="0 мин";
    segBreak=fmtHM(lunchE-cur);
    segAfter=fmtHM(Math.max(0,endMin-lunchE));

  } else if(cur>=lunchE&&cur<endMin){
    phase="after";
    const rem=(endMin-cur)*60-sec;
    status="До конца рабочего дня"; bigTime=fmt(rem); sub="Вторая половина дня";
    p1=100; p2=100;
    p3=Math.min(100,(((cur-lunchE)*60+sec)/((endMin-lunchE)*60))*100);
    showFlame=true;
    segLunch="0 мин"; segBreak="0 мин"; segAfter=fmt(rem);

  } else {
    phase="done";
    status="Рабочий день окончен"; bigTime="—"; sub="Хорошего вечера!";
    p1=100; p2=100; p3=100;
  }

  /* fireworks on transition to done */
  if(phase==="done"&&prevPhase!=="done"&&prevPhase!==""){
    startFireworks();
  }
  prevPhase=phase;

  /* update DOM */
  document.getElementById("status").textContent=status;
  document.getElementById("big-time").textContent=bigTime;
  document.getElementById("sub").textContent=sub;

  document.getElementById("bar1").style.width=p1+"%";
  document.getElementById("bar2").style.width=p2+"%";
  document.getElementById("bar3").style.width=p3+"%";

  /* flame: hide when 0% or 100% */
  const flame=document.getElementById("fuse-flame");
  flame.style.display=(showFlame&&p3>0&&p3<100)?"block":"none";

  document.getElementById("seg-lunch").textContent=segLunch;
  document.getElementById("seg-break").textContent=segBreak;
  document.getElementById("seg-after").textContent=segAfter;
}

function toggleSchedule(){document.getElementById("sched-panel").classList.toggle("open");}
function saveSchedule(){
  sched.start=document.getElementById("s-start").value;
  sched.endWk=document.getElementById("s-end-wk").value;
  sched.endFri=document.getElementById("s-end-fri").value;
  sched.lunchS=document.getElementById("s-lunch-s").value;
  sched.lunchE=document.getElementById("s-lunch-e").value;
  document.getElementById("sched-panel").classList.remove("open");
  tick();
}

tick();
setInterval(tick,1000);
</script>
</body>
</html>
